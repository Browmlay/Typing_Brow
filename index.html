<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type Brow - Master Literature Through Typing</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <script src="https://unpkg.com/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #141829;
            --bg-tertiary: #1f2538;
            --bg-hover: #2a3447;
            --text-primary: #e8eef9;
            --text-secondary: #a0aac7;
            --text-tertiary: #6f7a95;
            --text-faded: #4a5568;
            --border-color: #2a3447;
            --border-light: #1f2538;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --accent-amber: #f59e0b;
            --accent-purple: #8b5cf6;
        }

        body {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        html, body {
            height: 100%;
        }

        #root {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2.5rem 2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            margin-bottom: 3rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            flex: 1;
        }

        /* Upload Section */
        .upload-section {
            background: var(--bg-secondary);
            border: 2px dashed var(--border-color);
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .upload-section:hover {
            border-color: var(--accent-blue);
            background: var(--bg-hover);
            transform: translateY(-2px);
        }

        .upload-section input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            opacity: 0.8;
        }

        .upload-section h3 {
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
            font-weight: 600;
        }

        .upload-section p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 0.85rem 1.75rem;
            border: 1.5px solid var(--border-color);
            background: transparent;
            color: var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s;
            font-family: inherit;
            letter-spacing: 0.3px;
        }

        button:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        button:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        button.primary {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }

        button.primary:hover {
            background: #2563eb;
            border-color: #2563eb;
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
        }

        button.success {
            background: var(--accent-green);
            color: white;
            border-color: var(--accent-green);
        }

        button.success:hover {
            background: #059669;
            border-color: #059669;
        }

        /* Settings Panel */
        .settings-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .setting-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .setting-group input,
        .setting-group select {
            padding: 0.85rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        .setting-group input:focus,
        .setting-group select:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: var(--bg-hover);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* Typing Container */
        .typing-container {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 4rem 3rem 3rem;
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .typing-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-item {
            background: var(--bg-tertiary);
            padding: 1.25rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border-light);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .stat-value {
            font-size: 1.85rem;
            font-weight: 700;
            color: var(--accent-blue);
            font-family: 'Courier New', monospace;
            letter-spacing: -0.5px;
        }

        /* New Typing Interface */
        .typing-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .progress-indicator {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.85rem;
            color: var(--text-tertiary);
            padding: 0 0 1rem 0;
            border-bottom: 1px solid var(--border-light);
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            transition: width 0.3s ease;
        }

        /* Main Typing Area */
        .typing-text-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .typing-text-viewport {
            width: 100%;
            height: auto;
            overflow-x: auto;
            overflow-y: hidden;
            position: relative;
            display: flex;
            align-items: center;
            scroll-behavior: smooth;
        }

        .typing-text {
            font-size: 2rem;
            line-height: 1.8;
            font-family: 'Courier New', 'Monaco', monospace;
            font-weight: 500;
            letter-spacing: 0.5px;
            display: flex;
            flex-wrap: nowrap;
            gap: 0.3rem;
            white-space: nowrap;
            min-width: min-content;
            padding: 0 40vw;
        }

        .word {
            position: relative;
            display: inline-flex;
            gap: 0;
            white-space: nowrap;
            transition: all 0.1s ease-out;
        }

        .word.active {
            transform: scale(1.08);
            color: var(--accent-blue);
            font-weight: 600;
        }

        .char {
            position: relative;
            padding: 0.2rem 0;
            transition: all 0.05s ease-out;
        }

        .char.typed-correct {
            color: var(--text-faded);
            opacity: 0.45;
        }

        .char.active {
            color: var(--text-primary);
            background: var(--accent-blue);
            border-radius: 3px;
            padding: 0.2rem 0.3rem;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
            animation: cursor-pulse 1s infinite;
        }

        .char.future {
            color: var(--text-secondary);
        }

        .error-indicator {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-red);
            color: white;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
            z-index: 10;
        }

        @keyframes cursor-pulse {
            0%, 49%, 100% { opacity: 1; }
            50%, 99% { opacity: 0.3; }
        }

        /* Upcoming Text */
        .upcoming-text-section {
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-light);
        }

        .upcoming-label {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .upcoming-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-secondary);
            font-family: 'Courier New', monospace;
            letter-spacing: 0.3px;
            transition: all 0.2s ease;
            word-break: break-word;
            min-height: 60px;
        }

        /* Hidden Input */
        .typing-input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
            pointer-events: none;
        }

        /* Session Info */
        .session-info {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .session-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .trial-badge {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Results Container */
        .results-container {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 3rem;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
        }

        .results-header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
        }

        .results-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .result-card {
            background: var(--bg-tertiary);
            padding: 1.75rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border-light);
            transition: all 0.2s;
        }

        .result-card:hover {
            border-color: var(--accent-blue);
            background: var(--bg-hover);
        }

        .result-label {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .result-value {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--accent-blue);
            font-family: 'Courier New', monospace;
            letter-spacing: -0.5px;
        }

        .result-card.accurate .result-value {
            color: var(--accent-green);
        }

        .result-card.speed .result-value {
            color: var(--accent-blue);
        }

        /* Chart */
        .chart-container {
            background: var(--bg-tertiary);
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            position: relative;
            height: 340px;
            border: 1px solid var(--border-light);
        }

        .chart-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Error Analysis */
        .error-analysis {
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
        }

        .error-analysis h3 {
            font-size: 1rem;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
            font-weight: 600;
        }

        .error-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }

        .error-item {
            background: var(--bg-secondary);
            padding: 1.25rem;
            border-radius: 8px;
            border-left: 3px solid var(--accent-red);
        }

        .error-key {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            font-family: monospace;
        }

        .error-count {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--accent-red);
        }

        /* Textarea */
        .textarea-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .textarea-container label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .textarea-container textarea {
            padding: 1.25rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: 'Courier New', monospace;
            resize: vertical;
            min-height: 180px;
            transition: all 0.2s;
        }

        .textarea-container textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: var(--bg-hover);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .divider {
            height: 1px;
            background: var(--border-color);
            margin: 2rem 0;
        }

/* Wikipedia Carousel */
        .carousel-wrapper {
            margin-top: 2rem;
            width: 100%;
            min-width: 0;
            overflow: hidden;
        }

        .carousel-title {
            font-size: 1.25rem;
            margin-bottom: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            padding-left: 0.5rem;
        }

        .carousel-container {
            display: flex;
            overflow-x: auto;
            gap: 1.5rem;
            padding-bottom: 1.5rem;
            scroll-behavior: smooth;
            width: 100%;
            -webkit-overflow-scrolling: touch;
        }

        .carousel-container::-webkit-scrollbar {
            height: 8px;
        }

        .carousel-container::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }

        .carousel-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        
        .carousel-container::-webkit-scrollbar-thumb:hover {
            background: var(--accent-blue);
        }

        .book-card {
            min-width: 160px;
            max-width: 160px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .book-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-blue);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .book-cover {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-light);
        }

        .book-info {
            padding: 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .book-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: normal;
            line-height: 1.3;
        }

        .book-author {
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: normal;
            line-height: 1.4;
        }

        .loading-text {
            color: var(--text-secondary);
            font-style: italic;
            padding-left: 0.5rem;
        }

        /* Keyboard Navigation Indicator */
        .kb-nav-hint {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 1.5rem 1rem;
            }

            .header h1 {
                font-size: 2rem;
            }

            .typing-container {
                padding: 2rem 1.5rem 1.5rem;
                min-height: 50vh;
            }

            .typing-text {
                font-size: 1.5rem;
            }

            .typing-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .settings-grid {
                grid-template-columns: 1fr;
            }

            .results-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const e = React.createElement;
        const { useState, useEffect, useRef } = React;

        // PDF.js setup
        if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
        }

        // ============================================================================
        // UTILITIES
        // ============================================================================

        const STORAGE_KEYS = {
            CURRENT_BOOK: 'type_brow_current_book',
            CURRENT_SESSION: 'type_brow_current_session',
            TRIALS_STATS: 'type_brow_trials_stats',
            SETTINGS: 'type_brow_settings',
        };

        const DEFAULT_SETTINGS = {
            trialMode: 'word_count',
            trialSize: 150,
            timeLimitMinutes: 5,
        };

        const calculateStats = (originalText, typedText, timeMs) => {
            const words = originalText.trim().split(/\s+/).length;
            const minutes = timeMs / 60000;
            const wpm = Math.round((words / minutes) * 10) / 10;

            let correct = 0;
            let total = originalText.length;

            for (let i = 0; i < originalText.length; i++) {
                if (typedText[i] === originalText[i]) {
                    correct++;
                }
            }

            const accuracy = Math.round((correct / total) * 1000) / 10;

            const errors = {};
            for (let i = 0; i < originalText.length; i++) {
                if (typedText[i] && typedText[i] !== originalText[i]) {
                    const key = `${originalText[i]} → ${typedText[i]}`;
                    errors[key] = (errors[key] || 0) + 1;
                }
            }

            const sortedErrors = Object.entries(errors)
                .sort(([, a], [, b]) => b - a)
                .slice(0, 6);

            return {
                wpm,
                accuracy,
                timeMs,
                correct,
                total,
                errors: Object.fromEntries(sortedErrors),
            };
        };

        const extractPdfText = async (file) => {
            return new Promise(async (resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    try {
                        if (typeof pdfjsLib === 'undefined') {
                            throw new Error('PDF.js library not loaded');
                        }
                        const pdf = await pdfjsLib.getDocument(ev.target.result).promise;
                        let text = '';
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const content = await page.getTextContent();
                            text += content.items.map((item) => item.str).join('') + '\n';
                        }
                        resolve(text);
                    } catch (error) {
                        reject(error);
                    }
                };
                reader.readAsArrayBuffer(file);
            });
        };

        // ============================================================================
        // WIKIPEDIA COMPONENT (Image-Only Enforcement)
        // ============================================================================

function WikipediaCarousel({ onSelectBook }) {
            const [articles, setArticles] = useState([]);
            const [loading, setLoading] = useState(true);
            const [fetchingText, setFetchingText] = useState(false);
            const [triggerRefresh, setTriggerRefresh] = useState(0);

            useEffect(() => {
                let isMounted = true;
                setLoading(true);

                const fetchArticlesWithImages = async () => {
                    let validArticles = [];
                    try {
                        while (validArticles.length < 10 && isMounted) {
                            const fetchUrl = 'https://en.wikipedia.org/w/api.php?action=query&generator=random&grnnamespace=0&grnlimit=20&prop=pageimages|extracts&exchars=100&exintro=1&explaintext=1&pithumbsize=320&format=json&origin=*';
                            
                            const res = await fetch(fetchUrl);
                            const data = await res.json();
                            
                            if (data.query && data.query.pages) {
                                const pagesArray = Object.values(data.query.pages);
                                const withImages = pagesArray.filter(page => page.thumbnail && page.thumbnail.source);
                                
                                for (const article of withImages) {
                                    if (!validArticles.some(a => a.pageid === article.pageid)) {
                                        validArticles.push(article);
                                    }
                                }
                            }
                        }

                        if (isMounted) {
                            setArticles(validArticles.slice(0, 10));
                            setLoading(false);
                        }
                    } catch (err) {
                        console.error('Error fetching Wikipedia articles:', err);
                        if (isMounted) setLoading(false);
                    }
                };

                fetchArticlesWithImages();
                return () => { isMounted = false; };
            }, [triggerRefresh]);

            const handleArticleClick = async (article) => {
                setFetchingText(true);
                try {
                    const textFetchUrl = `https://en.wikipedia.org/w/api.php?action=query&prop=extracts&explaintext=1&pageids=${article.pageid}&format=json&origin=*`;
                    const res = await fetch(textFetchUrl);
                    const data = await res.json();
                    
                    const pageData = data.query.pages[article.pageid];
                    if (pageData && pageData.extract) {
                        const cleanText = pageData.extract.replace(/==+.*?==+/g, '').replace(/\n{2,}/g, '\n\n').trim();
                        onSelectBook(cleanText, article.title);
                    }
                } catch (err) {
                    console.error(err);
                    alert('Error loading article text.');
                } finally {
                    setFetchingText(false);
                }
            };

            return e('div', { className: 'carousel-wrapper' },
                e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.25rem' } },
                    e('h3', { className: 'carousel-title', style: { marginBottom: 0 } }, 'Or practice with a random Wikipedia article'),

                        onClick: () => setTriggerRefresh(prev => prev + 1),
                        style: { padding: '0.4rem 0.8rem', fontSize: '0.8rem', cursor: 'pointer' }
                    }, 'Refresh Suggestions')
                ),
                loading ? e('p', { className: 'loading-text' }, 'Hunting for articles with images...') :
                fetchingText ? e('p', { className: 'loading-text' }, 'Extracting article text...') :
                e('div', { className: 'carousel-container' },
                    articles.map(article => e('div', {
                        key: article.pageid,
                        className: 'book-card',
                        onClick: () => handleArticleClick(article)
                    },
                        e('img', {
                            className: 'book-cover',
                            src: article.thumbnail.source,
                            alt: article.title,
                            loading: 'lazy'
                        }),
                        e('div', { className: 'book-info' },
                            e('div', { className: 'book-title', title: article.title }, article.title),
                            e('div', { className: 'book-author', style: { WebkitLineClamp: 3, display: '-webkit-box', WebkitBoxOrient: 'vertical', whiteSpace: 'normal', fontSize: '0.75rem' } }, article.extract || 'Wikipedia, the free encyclopedia')
                        )
                    ))
                )
            );
        }

        function TypingSection({ bookText, bookName, settings, currentSession, onTrialComplete, onCancel }) {
            const [trialText, setTrialText] = useState('');
            const [typedText, setTypedText] = useState('');
            const [startTime, setStartTime] = useState(Date.now());
            const [elapsedSeconds, setElapsedSeconds] = useState(0);
            const [lastError, setLastError] = useState(null);
            const [consecutiveErrors, setConsecutiveErrors] = useState(0);
            const inputRef = useRef(null);
            const scrollContainerRef = useRef(null);
            const textContainerRef = useRef(null);

            useEffect(() => {
                const words = bookText.split(/\s+/);
                const startIndex = currentSession.currentTrialIndex * settings.trialSize;
                const endIndex = startIndex + settings.trialSize;
                const trial = words.slice(startIndex, endIndex).join(' ');
                setTrialText(trial);
            }, []);

            useEffect(() => {
                const interval = setInterval(() => {
                    setElapsedSeconds(Math.round((Date.now() - startTime) / 1000));
                }, 100);
                return () => clearInterval(interval);
            }, [startTime]);

            useEffect(() => {
                inputRef.current?.focus();
            }, []);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') {
                        onCancel();
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            useEffect(() => {
                if (textContainerRef.current && scrollContainerRef.current) {
                    const container = scrollContainerRef.current;
                    const text = textContainerRef.current;
                    const activeChar = text.querySelector('.char.active');
                    
                    if (activeChar) {
                        activeChar.scrollIntoView({
                            behavior: 'smooth',
                            block: 'center',
                            inline: 'center'
                        });
                    }
                }
            }, [typedText]);

            const handleInputChange = (ev) => {
                const value = ev.target.value;
                const previousLength = typedText.length;

                if (value.length > previousLength) {
                    const newChar = value[value.length - 1];
                    const expectedChar = trialText[value.length - 1];

                    if (newChar !== expectedChar) {
                        setLastError(newChar);
                        setTimeout(() => setLastError(null), 300);
                    } else {
                        setLastError(null);
                    }
                }

                setTypedText(value);

                if (value.length >= trialText.length) {
                    const timeMs = Date.now() - startTime;
                    const stats = calculateStats(trialText, value, timeMs);
                    onTrialComplete(stats);
                }
            };

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const correctChars = [...typedText].filter((char, i) => char === trialText[i]).length;
            const accuracy = typedText.length > 0 ? Math.round((correctChars / typedText.length) * 1000) / 10 : 0;
            const wpm = elapsedSeconds > 0 ? Math.round((correctChars / 5 / (elapsedSeconds / 60)) * 10) / 10 : 0;
            const progress = Math.round((typedText.length / trialText.length) * 100);

            const upcomingText = trialText.slice(typedText.length);

            return e('div', { className: 'app-container' },
                e('div', { className: 'header' },
                    e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
                        e('div', null,
                            e('h1', { style: { fontSize: '2rem', marginBottom: '0.25rem' } }, 'Type Brow'),
                            e('p', { style: { color: 'var(--text-secondary)' } }, bookName)
                        ),
                        e('button', { onClick: onCancel, style: { padding: '0.6rem 1.2rem' } }, 'End [Esc]')
                    )
                ),

                e('div', { className: 'main-content' },
                    e('div', { className: 'typing-container' },
                        e('div', { className: 'typing-stats' },
                            e('div', { className: 'stat-item' },
                                e('div', { className: 'stat-label' }, 'WPM'),
                                e('div', { className: 'stat-value' }, wpm)
                            ),
                            e('div', { className: 'stat-item' },
                                e('div', { className: 'stat-label' }, 'Accuracy'),
                                e('div', { className: 'stat-value' }, accuracy, '%')
                            ),
                            e('div', { className: 'stat-item' },
                                e('div', { className: 'stat-label' }, 'Time'),
                                e('div', { className: 'stat-value' }, formatTime(elapsedSeconds))
                            ),
                            e('div', { className: 'stat-item' },
                                e('div', { className: 'stat-label' }, consecutiveErrors >= 3 ? '❌ BLOCKED' : 'Errors'),
                                e('div', { className: 'stat-value', style: { color: consecutiveErrors >= 3 ? 'var(--accent-red)' : 'var(--accent-blue)' } }, consecutiveErrors, ' / 3')
                            )
                        ),

                        e('div', { className: 'progress-indicator' },
                            e('span', null, 'Trial ', currentSession.currentTrialIndex + 1, ' • '),
                            e('div', { className: 'progress-bar' },
                                e('div', { className: 'progress-fill', style: { width: progress + '%' } })
                            ),
                            e('span', null, typedText.length, ' / ', trialText.length)
                        ),

                        e('div', { className: 'typing-main' },
                            e('div', { className: 'typing-text-container' },
                                e('div', { 
                                    ref: scrollContainerRef,
                                    className: 'typing-text-viewport',
                                    style: { position: 'relative' }
                                },
                                    e('div', { ref: textContainerRef, className: 'typing-text' },
                                        (() => {
                                            const segments = trialText.split(/(\s+)/);
                                            let charOffset = 0;
                                            return segments.map((segment, i) => {
                                                const segmentStart = charOffset;
                                                if (/\s/.test(segment)) {
                                                    charOffset += segment.length;
                                                    return e('span', { key: `space-${i}` }, segment);
                                                }

                                                const result = e('div', { key: `word-${i}`, className: 'word' },
                                                    segment.split('').map((char, j) => {
                                                        const charIndex = segmentStart + j;
                                                        let className = 'char';
                                                        let content = char;

                                                        if (charIndex === typedText.length) {
                                                            className += ' active';
                                                        } else if (charIndex < typedText.length) {
                                                            className += typedText[charIndex] === char ? ' typed-correct' : ' incorrect';
                                                        } else {
                                                            className += ' future';
                                                        }

                                                        return e('div', { 
                                                            key: j, 
                                                            className,
                                                            style: { position: 'relative' }
                                                        },
                                                            charIndex === typedText.length && lastError && e('div', { className: 'error-indicator' }, lastError),
                                                            content
                                                        );
                                                    })
                                                );
                                                charOffset += segment.length;
                                                return result;
                                            });
                                        })()
                                    )
                                )
                            ),

                            e('div', { className: 'upcoming-text-section' },
                                e('div', { className: 'upcoming-label' }, 'Next'),
                                e('div', { className: 'upcoming-text' }, upcomingText.substring(0, 200))
                            )
                        )
                    )
                ),

                e('input', {
                    ref: inputRef,
                    type: 'text',
                    className: 'typing-input',
                    value: typedText,
                    onChange: handleInputChange,
                    autoFocus: true,
                    spellCheck: 'false',
                    autoComplete: 'off'
                }),

                e('div', { className: 'kb-nav-hint' }, 'Esc to exit')
            );
        }

            });

                const saved = localStorage.getItem(STORAGE_KEYS.CURRENT_SESSION);
                return saved ? JSON.parse(saved) : null;
            });

            });

            useEffect(() => {
                localStorage.setItem(STORAGE_KEYS.TRIALS_STATS, JSON.stringify(trialsStats));
            }, [trialsStats]);

            const handleFileUpload = async (file) => {
                try {
                    let text;
                    if (file.type === 'application/pdf') {
                        text = await extractPdfText(file);
                    } else {
                        text = await file.text();
                    }
                    setBookText(text);
                    setBookName(file.name);
                    localStorage.setItem(STORAGE_KEYS.CURRENT_BOOK, JSON.stringify({ text, name: file.name }));
                    setAppState('settings');
                } catch (error) {
                    alert('Error: ' + error.message);
                }
            };

            const handleTextInput = (text, customName) => {
                const finalName = typeof customName === 'string' ? customName : 'Pasted Text';
                setBookText(text);
                setBookName(finalName);
                localStorage.setItem(STORAGE_KEYS.CURRENT_BOOK, JSON.stringify({ text, name: finalName }));
                setAppState('settings');
            };

            const handleStartSession = () => {
                const totalWords = bookText.trim().split(/\s+/).length;
                const newSession = {
                    bookName,
                    startTime: Date.now(),
                    totalWords,
                    currentTrialIndex: 0,
                    trials: [],
                };
                setCurrentSession(newSession);
                setTrialsStats([]);
                setAppState('typing');
            };

            const handleTrialComplete = (stats) => {
                setTrialsStats([...trialsStats, stats]);
                setCurrentSession({
                    ...currentSession,
                    currentTrialIndex: currentSession.currentTrialIndex + 1,
                    trials: [...(currentSession.trials || []), stats],
                });
                setAppState('results');
            };

            const handleNextTrial = () => {
                setAppState('typing');
            };

            const handleEndSession = () => {
                setCurrentSession(null);
                localStorage.removeItem(STORAGE_KEYS.CURRENT_SESSION);
                setAppState('upload');
            };

            const handleResumeSession = () => {
                if (currentSession) {
                    const savedBook = localStorage.getItem(STORAGE_KEYS.CURRENT_BOOK);
                    if (savedBook) {
                        const { text, name } = JSON.parse(savedBook);
                        setBookText(text);
                        setBookName(name);
                    }
                    setAppState('typing');
                }
            };

            if (appState === 'upload') {
                return e(UploadSection, {
                    onFileUpload: handleFileUpload,
                    onTextInput: handleTextInput,
                    onResumeSession: handleResumeSession,
                    currentSession,
                });
            }

            if (appState === 'settings') {
                return e(SettingsSection, {
                    settings,
                    onSettingsChange: setSettings,
                    onStart: handleStartSession,
                    bookName,
                    onCancel: () => setAppState('upload'),
                    bookText,
                });
            }

            if (appState === 'typing') {
                return e(TypingSection, {
                    bookText,
                    bookName,
                    settings,
                    currentSession,
                    onTrialComplete: handleTrialComplete,
                    onCancel: handleEndSession,
                });
            }

            if (appState === 'results') {
                return e(ResultsSection, {
                    stats: trialsStats[trialsStats.length - 1],
                    allStats: trialsStats,
                    currentSession,
                    onNextTrial: handleNextTrial,
                    onEndSession: handleEndSession,
                    bookText,
                    settings,
                });
            }
        }

        // ============================================================================
        // RENDER
        // ============================================================================

        ReactDOM.createRoot(document.getElementById('root')).render(e(TypingTutorApp));
    </script>
</body>
</html>
